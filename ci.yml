# ============================================================
# GitHub Actions CI Workflow
# ============================================================
# What is CI (Continuous Integration)?
#
#   Every time you push code to GitHub, this workflow runs
#   automatically to:
#     1. Install all dependencies
#     2. Check code style (flake8)
#     3. Run your tests
#     4. Show a green ✅ or red ❌ badge on your README
#
# To add the badge to your README.md, paste this line:
#
#   ![CI](https://github.com/YOUR_USERNAME/YOUR_REPO/actions/workflows/ci.yml/badge.svg)
#
# Save this file at: .github/workflows/ci.yml
# ============================================================

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Cache pip packages (speeds up repeated runs)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest
          python -m spacy download en_core_web_sm

      # 5. Lint with flake8 (catches obvious code errors)
      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail (max line length 120)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      # 6. Run tests
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: true   # don't fail CI if tests folder is empty yet
